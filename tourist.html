<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tourist Paradise - Trincomalee</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+Sinhala:wght@400;600;700&family=Outfit:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap"
        rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                        serif: ['"Playfair Display"', 'serif'],
                        sinhala: ['"Iskoola Pota"', '"Noto Sans Sinhala"', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#f0fdfa',
                            100: '#ccfbf1',
                            400: '#2dd4bf',
                            500: '#14b8a6',
                            600: '#0d9488',
                            900: '#134e4a',
                        },
                        gold: {
                            400: '#fbbf24',
                            500: '#f59e0b',
                        }
                    },
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                        'reveal': 'reveal 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' },
                        },
                        reveal: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #0f172a;
        }

        ::-webkit-scrollbar-thumb {
            background: #2dd4bf;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #14b8a6;
        }

        .text-shadow {
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .card-hover:hover .card-content {
            transform: translateY(0);
        }

        .bg-pattern {
            background-color: #0f172a;
            background-image: radial-gradient(#1e293b 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* Sinhala Font Class */
        .font-sinhala {
            font-family: 'Iskoola Pota', 'Noto Sans Sinhala', sans-serif;
        }
    </style>
</head>

<body class="bg-pattern min-h-screen text-slate-200 selection:bg-brand-500 selection:text-white overflow-x-hidden">

    <!-- Navigation -->
    <nav
        class="fixed w-full z-50 transition-all duration-300 bg-slate-900/80 backdrop-blur-md border-b border-white/10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-20">
                <a href="index.html" class="flex items-center gap-3 hover:opacity-80 transition-opacity">
                    <div
                        class="w-10 h-10 bg-brand-600 rounded-xl flex items-center justify-center text-white font-bold text-xl shadow-lg shadow-brand-500/30">
                        T
                    </div>
                    <div>
                        <h1 class="text-xl md:text-2xl font-bold text-white">Trinco News</h1>
                    </div>
                </a>

                <div class="flex items-center space-x-1 md:space-x-8">
                    <a href="index.html"
                        class="px-4 py-2 rounded-lg text-slate-300 hover:text-white hover:bg-white/5 transition-all">Home</a>
                    <a href="index.html"
                        class="px-4 py-2 rounded-lg text-slate-300 hover:text-white hover:bg-white/5 transition-all">Latest</a>
                    <a href="#"
                        class="px-4 py-2 rounded-lg text-brand-400 bg-brand-500/10 font-medium border border-brand-500/20 shadow-[0_0_15px_rgba(20,184,166,0.3)]">Tourist
                        Places</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <header class="relative h-[70vh] flex items-center justify-center overflow-hidden">
        <div class="absolute inset-0 z-0">
            <img src="https://images.unsplash.com/photo-1588528292866-51f228d70954?q=80&w=2070&auto=format&fit=crop"
                alt="Trincomalee Beach"
                class="w-full h-full object-cover filter brightness-50 scale-105 animate-[pulse_10s_ease-in-out_infinite_alternate]">
        </div>

        <div class="relative z-10 text-center max-w-4xl px-4 animate-reveal">
            <span
                class="inline-block py-1 px-4 rounded-full bg-white/10 backdrop-blur border border-white/20 text-brand-300 text-sm font-semibold mb-6 tracking-wider uppercase">
                Explore The East Coast
            </span>
            <h1 class="font-serif text-5xl md:text-7xl lg:text-8xl font-bold text-white mb-6 leading-tight text-shadow">
                Discover <span
                    class="text-transparent bg-clip-text bg-gradient-to-r from-brand-400 via-brand-200 to-white">Trincomalee</span>
            </h1>
            <p class="text-xl text-slate-200 max-w-2xl mx-auto font-light leading-relaxed">
                From pristine beaches to ancient temples, experience the hidden gems of Sri Lanka's finest natural
                harbor.
            </p>
        </div>

        <div class="absolute bottom-10 left-1/2 transform -translate-x-1/2 animate-bounce text-white/50">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3" />
            </svg>
        </div>
    </header>

    <!-- Content Section -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-20">

        <!-- Places Grid -->
        <div id="tourist-container" class="grid grid-cols-1 md:grid-cols-2 gap-12 lg:gap-16">
            <!-- Items injected by JS -->
            <div class="col-span-full text-center py-20 text-slate-500 animate-pulse">
                Loading paradise locations...
            </div>
        </div>

    </main>

    <!-- Footer -->
    <footer class="bg-slate-900 border-t border-slate-800 py-12">
        <div class="max-w-7xl mx-auto px-4 text-center text-slate-500">
            <p>© 2026 Trincomalee News Update. Design by Antigravity.</p>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="tourist_data.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Delay slightly for effect
            setTimeout(loadTouristPlaces, 500);
        });

        function loadTouristPlaces() {
            const container = document.getElementById('tourist-container');
            const data = window.touristData || [];

            if (data.length === 0) {
                container.innerHTML = '<div class="col-span-full text-center text-slate-400">No tourist places found. Add folders to "Tourist Places".</div>';
                return;
            }

            container.innerHTML = '';

            data.forEach((place, index) => {
                const isEven = index % 2 === 0;

                const card = document.createElement('div');
                card.className = `group relative overflow-hidden rounded-3xl bg-slate-800 shadow-2xl transition-all duration-500 hover:shadow-brand-500/20 hover:-translate-y-2 opacity-0 animate-reveal`;
                card.style.animationDelay = `${index * 0.2}s`;

                // Truncate content for preview
                const fullContent = place.content || '';
                const preview = fullContent.substring(0, 150) + '...';

                card.innerHTML = `
                    <div class="aspect-w-16 aspect-h-12 md:aspect-h-10 overflow-hidden relative h-96">
                        <img src="${place.image}" 
                             alt="${place.title}" 
                             class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110"
                             onerror="this.src='https://images.unsplash.com/photo-1546708773-e57c17acb407?q=80&w=2669&auto=format&fit=crop'">
                        <div class="absolute inset-0 bg-gradient-to-t from-slate-900 via-slate-900/40 to-transparent opacity-80 group-hover:opacity-60 transition-opacity"></div>
                        
                        <div class="absolute bottom-0 left-0 right-0 p-8 transform translate-y-4 group-hover:translate-y-0 transition-transform duration-500">
                            <h2 class="font-sinhala text-3xl font-bold text-white mb-2 font-serif text-shadow">${place.title}</h2>
                            <div class="h-0 group-hover:h-auto overflow-hidden transition-all duration-500 opacity-0 group-hover:opacity-100">
                                <p class="font-sinhala text-slate-200 text-lg leading-relaxed mb-6 drop-shadow-md">
                                    ${preview}
                                </p>
                                <button onclick="openModal('${index}')" 
                                        class="inline-flex items-center gap-2 px-6 py-3 bg-brand-500 hover:bg-brand-400 text-white rounded-full font-medium transition-colors shadow-lg shadow-brand-500/30">
                                    Explore More
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3" />
                                    </svg>
                                </button>
                            </div>
                            <div class="group-hover:opacity-0 transition-opacity duration-300">
                                <p class="text-brand-400 text-sm font-semibold tracking-wider uppercase mt-2">Tap to Discover</p>
                            </div>
                        </div>
                    </div>
                `;

                container.appendChild(card);
            });
        }

        // Simple Modal Logic
        function openModal(index) {
            const place = window.touristData[index];
            if (!place) return;

            // Create modal if not exists
            let modal = document.getElementById('place-modal');
            if (!modal) {
                modal = document.createElement('div');
                modal.id = 'place-modal';
                modal.className = 'fixed inset-0 z-[60] flex items-center justify-center p-4 opacity-0 pointer-events-none transition-opacity duration-300';
                modal.innerHTML = `
                    <div class="absolute inset-0 bg-black/90 backdrop-blur-md transition-opacity" onclick="closeModal()"></div>
                    <div class="relative w-full max-w-5xl h-[85vh] bg-slate-900 rounded-3xl overflow-hidden shadow-2xl flex flex-col md:flex-row transform scale-95 transition-transform duration-300">
                        <button onclick="closeModal()" class="absolute top-4 right-4 z-20 p-2 bg-black/50 hover:bg-black/70 rounded-full text-white transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                            </svg>
                        </button>
                        
                        <div class="md:w-1/2 h-64 md:h-full relative">
                            <img id="modal-img" src="" class="w-full h-full object-cover">
                            <div class="absolute inset-0 bg-gradient-to-t from-slate-900 md:bg-gradient-to-r via-transparent to-transparent opacity-60"></div>
                        </div>
                        
                        <div class="md:w-1/2 p-8 md:p-12 overflow-y-auto">
                            <h2 id="modal-title" class="font-sinhala text-3xl md:text-5xl font-bold text-white mb-6 font-serif"></h2>
                            <div class="w-20 h-1 bg-brand-500 mb-8"></div>
                            <div id="modal-desc" class="font-sinhala prose prose-invert prose-lg text-slate-300 leading-loose"></div>
                        </div>
                    </div>
                `;
                document.body.appendChild(modal);
            }

            document.getElementById('modal-img').src = place.image;
            document.getElementById('modal-title').textContent = place.title;

            // Format content with paragraphs
            const paragraphs = place.content.split('\n\n').map(p => `<p class="mb-4">${p}</p>`).join('');
            document.getElementById('modal-desc').innerHTML = paragraphs;

            // Show
            modal.classList.remove('opacity-0', 'pointer-events-none');
            setTimeout(() => {
                modal.querySelector('.relative').classList.remove('scale-95');
                modal.querySelector('.relative').classList.add('scale-100');
            }, 10);
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            const modal = document.getElementById('place-modal');
            if (!modal) return;

            modal.classList.add('opacity-0', 'pointer-events-none');
            modal.querySelector('.relative').classList.add('scale-95');
            modal.querySelector('.relative').classList.remove('scale-100');
            document.body.style.overflow = '';
        }
    </script>
</body>

</html>
